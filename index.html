<html lang="en">
<head>

<style>

body{
    font-family: Arial, sans-serif;
    background:#1e1e1e;
    color:#f5f5f5;

    padding:30px;
}

.container{
    max-width:600px;
    margin:auto;
    background:#2b2b2b;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 12px rgba(0,0,0,0.35);
}

h1{
    margin-top:0;
    text-align:center;
    color:#ffffff;
}

.links{
    display:flex;
    flex-direction:column;
    gap:16px;
    margin-top:20px;
}

.links a{
    text-decoration:none;
}

button{
    width:100%;
    padding:14px;
    font-size:18px;
    border:none;
    border-radius:6px;
    background:#4caf50;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#43a047;
}

@media (max-width:600px){

    body{
        padding:15px;
    }

    button{
        font-size:16px;
        padding:12px;
    }

}
