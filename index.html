<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA2 Tools</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#1e1e1e;
    color:#f5f5f5;
    margin:0;
    padding:30px;
}

.container{
    max-width:650px;
    margin:auto;
    background:#2b2b2b;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 12px rgba(0,0,0,0.35);
}

h1{
    text-align:center;
    margin-top:0;
}

.section{
    margin-top:25px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:14px;
}

button{
    width:100%;
    padding:14px;
    font-size:18px;
    border:none;
    border-radius:6px;
    background:#4caf50;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#43a047;
}

select{
    width:100%;
    padding:12px;
    font-size:16px;
    border-radius:6px;
    border:1px solid #555;
    background:#111;
    color:#fff;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

@media (max-width:600px){

    body{
        padding:15px;
    }

    button{
        font-size:16px;
        padding:12px;
    }

}

</style>
</head>

<body>

<div class="container">

<h1>Idle Artisan 2 Tools</h1>


<div class="section">
<h2>Calculators</h2>

<div class="links">

<a href="rationCostings.html">
<button>Ration Production Calculator (RomanyRoc)</button>
</a>

<a href="SOMCalc.html">
<button>Scroll of Mastery Calculator (RomanyRoc)</button>
</a>

<a href="tonkas.html">
<button>Crafting Rarity / Gathering Yield Calculator (Tonka)</button>
</a>

<a href="https://idleartisan.saeria.dev/">
<button>Refiner / Crafting Chance Calculator (Cae / Lyn)</button>
</a>

<a href="https://docs.google.com/spreadsheets/d/1ML9FBMoWqDacN2tYOdy1V7xhJoS3gCiJy_U0szr2YBA/edit?gid=0#gid=0">
<button>IA2 Crafting Calculator Spreadsheet (BigThickBoris)</button>
</a>

</div>
</div>


<div class="section">

<h2>Game Scripts</h2>

<label for="scriptSelect">Choose a Script</label>

<select id="scriptSelect" onchange="openScript()">

<option value="">Select a script...</option>
https://greasyfork.org/en/scripts/568687-idle-artisan-dungeon-dashboard
<option value="https://greasyfork.org/en/scripts/568687-idle-artisan-dungeon-dashboard">
Dungeon Lobby / Arena persistant UI editor by RomanyRoc
</option>

<option value="https://greasyfork.org/en/scripts/568499-idle-artisan-dungeon-dashboard">
Dungeon Damage / Level Dashboard by dele
</option>
<option value="https://greasyfork.org/en/scripts/568199-idleartisan2grid">
Idle Artisan 2 Grid UI Overhaul by moo
</option>

<option value="https://greasyfork.org/en/scripts/568379-idle-artisan-dungeon-helper ">
Dungeon Helper (Damage per Dungeon Level – WIP) by Nightchildkota
</option>

<option value="https://greasyfork.org/en/scripts/567894-idle-artisan-dungeon-ready-alert-room-stuck-alert">
Dungeon Ready / Room Stuck Alerts by Nightchildkota
</option>


<option value="https://greasyfork.org/en/scripts/567642-idle-artisan-tracker-ultimate">
Idle Artisan Tracker Ultimate by Nightchildkota
</option>

<option value="">
Auto monitor and undercut market sell orders by Unbe
</option>

<option value="">
Auto buy from market by jamminTheDev
</option>

</select>

</div>

</div>

<script>

function openScript(){

    const url = document.getElementById("scriptSelect").value;

    if(url){
        window.open(url, "_blank");
    }

}

</script>

</body>
</html>
